services:
  mysql:
    image: mysql:8.0
    container_name: forum_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: forum
      MYSQL_USER: forum_user
      MYSQL_PASSWORD: forum_pass
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  laravel-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: forum_laravel
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000

      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: forum
      DB_USERNAME: forum_user
      DB_PASSWORD: forum_pass

      SESSION_DOMAIN: localhost
      SESSION_DRIVER: file
    volumes:
      - ./backend:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8000:80"

volumes:
  mysql_data:
